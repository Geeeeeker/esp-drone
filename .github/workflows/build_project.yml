name: Build ESP-Drone Firmware

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Target chip'
        required: true
        default: 'esp32'
        type: choice
        options:
          - esp32
          - esp32s2
          - esp32s3
      pin_config:
        description: |
          Custom pin configuration (key=value, one per line)
          Example:
          CONFIG_MPU6050_SCL=22
          CONFIG_MPU6050_SDA=23
        required: false
        type: string
        default: ''
      release_tag:
        description: 'Release tag (e.g., v1.0.0). Leave empty for auto-generate'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Create GitHub Release and upload firmware'
        required: true
        type: boolean
        default: true

env:
  IDF_VERSION: v5.0.4   # 根据 README 建议使用 IDF 5.0 系列

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于创建 Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 使用官方 action 编译固件
      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ inputs.board }}
          path: .
          command: |
            # 如果用户提供了自定义引脚配置，则写入 sdkconfig 并重新配置
            if [ -n "${{ inputs.pin_config }}" ]; then
              echo "${{ inputs.pin_config }}" >> sdkconfig
              idf.py reconfigure
            fi
            idf.py build

      - name: Prepare firmware artifacts
        id: prepare
        run: |
          BOARD="${{ inputs.board }}"
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="manual-$(date +'%Y%m%d-%H%M%S')"
          fi
          ARTIFACT_NAME="esp-drone-firmware-${BOARD}-${TAG}"
          mkdir -p artifacts
          # 复制所有常见的固件文件
          cp build/*.bin artifacts/ 2>/dev/null || true
          cp build/bootloader/*.bin artifacts/ 2>/dev/null || true
          cp build/partition_table/*.bin artifacts/ 2>/dev/null || true
          # 生成 ZIP 包
          zip -j ${ARTIFACT_NAME}.zip artifacts/*.bin
          echo "artifact_path=${ARTIFACT_NAME}.zip" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Upload artifact to workflow run (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.tag }}_${{ inputs.board }}.zip
          path: ${{ steps.prepare.outputs.artifact_path }}
          if-no-files-found: error

      - name: Create GitHub Release and upload
        if: inputs.create_release == true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.prepare.outputs.tag }}
          name: "ESP-Drone Firmware ${{ steps.prepare.outputs.tag }}"
          body: |
            **Board**: ${{ inputs.board }}
            **Pin configuration**: ${{ inputs.pin_config || 'default' }}
            **Triggered by**: ${{ github.actor }}
          files: ${{ steps.prepare.outputs.artifact_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
